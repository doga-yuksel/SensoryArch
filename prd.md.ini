# 📄 Ürün Gereksinim Dokümanı (PRD): SensoryArch AI

**Sürüm:** 1.0  
**Durum:** Taslak  
**Proje Sahibi:** İç Mimarlık Araştırma Grubu  
[cite_start]**Rol:** Nöro-Çeşitli Bireyler İçin Duyusal Tasarım Analiz Aracı [cite: 1]

---

## 1. Ürün Özeti ve Vizyon
[cite_start]SensoryArch AI, iç mimari tasarımları Otizm, DEHB veya duyusal işleme bozukluğu olan bireylerin perspektifinden analiz eden bir web uygulamasıdır[cite: 1, 3]. [cite_start]Temel vizyon, tasarım aşamasında "duyusal aşırı yüklenme" (sensory overload) risklerini tespit ederek mekanları ölçülebilir bir erişilebilirlik standardına kavuşturmaktır[cite: 3, 15].

## 2. Hedef Kullanıcılar (User Personas)
* [cite_start]**İç Mimarlar ve Mimarlar:** Kamu binaları, okullar veya hastaneler tasarlayan ve projelerinin kapsayıcılığını test etmek isteyen profesyoneller[cite: 4].
* [cite_start]**Eğitim Kurumları ve Şirketler:** Mevcut sınıfları veya ofisleri çalışanları/öğrencileri için daha huzurlu hale getirmek isteyen yöneticiler[cite: 5].
* [cite_start]**Belediyeler ve Denetçiler:** Şehir planlamasında "erişilebilir kapalı alanlar" standartlarını denetleyen yetkililer[cite: 6].

## 3. Kullanıcı Hikayeleri (User Stories)
* [cite_start]**UH1:** Bir mimar olarak, tasarımımın 3D modelini veya fotoğrafını sisteme yükleyebilmeliyim ki duyusal risk raporunu saniyeler içinde alabileyim[cite: 7, 13].
* [cite_start]**UH2:** Bir tasarımcı olarak, mekanın farklı duyusal hassasiyetlere sahip bireyler tarafından nasıl deneyimlendiğini görsel filtrelerle (simülasyon) görebilmeliyim[cite: 8].
* [cite_start]**UH3:** Bir kullanıcı olarak, riskli bölgeler için yapay zekadan somut malzeme (örn: mat boya) veya akustik düzenleme önerileri alabilmeliyim[cite: 9].

## 4. Fonksiyonel Gereksinimler (Temel Özellikler)

### **A. Veri Girişi ve İşleme**
* [cite_start]Sistem; panoramik fotoğrafları, 2D görselleri veya 3D modelleri kabul etmelidir[cite: 7].
* [cite_start]AI; görüntüdeki ışık kaynaklarını, yansıma noktalarını ve karmaşık görsel paternleri taramalıdır[cite: 7].

### **B. Analiz ve Görselleştirme (Heatmap)**
* [cite_start]Mekan üzerindeki "Yüksek Uyaran" bölgeleri kırmızı renkli ısı haritası (heatmap) ile işaretlenmelidir[cite: 9].
* [cite_start]Tasarımın genel başarısı için tıp ve tasarım literatürüne dayalı teknik bir "Erişilebilirlik Skoru" üretilmelidir[cite: 12].

### **C. AI Öneri Motoru**
* [cite_start]Tespit edilen riskli alanlar için otomatik iyileştirme tavsiyeleri (akustik panel ekleme, ışık sıcaklığı değişimi vb.) sunulmalıdır[cite: 9].

## 5. Teknik Gereksinimler (MVP Seviyesi)
* **Frontend:** Kullanıcı dostu bir yükleme ekranı ve analiz sonuçlarının gösterildiği interaktif bir arayüz (React/Next.js).
* **Backend:** Görüntü işleme ve AI modellerinin çalışacağı sunucu altyapısı (Python/Flask veya Node.js).
* **AI Katmanı:** Işık ve doku analizi için Computer Vision (OpenCV/TensorFlow) modelleri.

## 6. Başarı Kriterleri (KPIs)
* [cite_start]**Hız:** Bir analizin tamamlanması ve raporun üretilmesi 30 saniyeden kısa sürmelidir[cite: 13].
* [cite_start]**Erişilebilirlik:** Nöro-çeşitli bireylerin bu mekanlarda "stres krizi" geçirme riskinin minimize edilmesi[cite: 14].
* [cite_start]**Standartlaşma:** "Nöro-erişilebilirlik" kriterinin iç mimarlıkta ölçülebilir bir standart haline gelmesi[cite: 15].